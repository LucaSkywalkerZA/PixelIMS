name: Build PixelIMS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Install Gradle
      run: |
        wget https://services.gradle.org/distributions/gradle-8.9-bin.zip
        unzip -q gradle-8.9-bin.zip
        export PATH=$PWD/gradle-8.9/bin:$PATH
        gradle --version
        
    # The app references @hide framework members (CarrierConfigManager.overrideConfig,
    # ActivityManager.INSTR_FLAG_*, Process.isSdkSandbox, etc.) that the public SDK
    # android.jar does not expose. Swap in a full hidden-API android.jar (a drop-in
    # replacement that also carries the framework resources.arsc, so aapt still links)
    # for compileSdk 35. This only affects compilation/linking; the packaged APK runs
    # against the device framework, unlocked at runtime via hiddenapibypass.
    - name: Install hidden-API android.jar
      run: |
        yes | sdkmanager "platforms;android-35" >/dev/null 2>&1 || true
        PLATFORM="$ANDROID_SDK_ROOT/platforms/android-35"
        curl -sSL --retry 3 -o /tmp/android-hidden.jar \
          https://raw.githubusercontent.com/Reginer/aosp-android-jar/main/android-35/android.jar
        test -s /tmp/android-hidden.jar
        mv "$PLATFORM/android.jar" "$PLATFORM/android.jar.orig"
        cp /tmp/android-hidden.jar "$PLATFORM/android.jar"

    - name: Build with Gradle
      run: |
        export PATH=$PWD/gradle-8.9/bin:$PATH
        cd $GITHUB_WORKSPACE
        gradle assembleRelease --stacktrace --no-daemon
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PixelIMS-release
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: error
